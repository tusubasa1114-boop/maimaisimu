<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>maimai Simulator - Safari Fixed</title>
    <style>
        /* Safariのバウンス（画面端の跳ね返り）を抑制しつつスクロールを許可 */
        html {
            overflow-y: scroll;
            -webkit-text-size-adjust: 100%;
        }

        body { 
            background: #111; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 20px 0 100px 0;
            min-height: 100vh;
        }

        #game-container { 
            position: relative; 
            width: min(95vw, 650px); 
            height: min(95vw, 650px); 
            margin-bottom: 30px;
            /* touch-action: noneをやめ、autoにする */
            touch-action: auto; 
            flex-shrink: 0;
        }

        canvas { 
            background: black; 
            border-radius: 50%; 
            width: 100%; 
            height: 100%; 
            display: block;
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
            /* iOS Safariでのタップ時のハイライトを消す */
            -webkit-tap-highlight-color: transparent;
        }

        #ui { 
            width: min(90vw, 600px); 
            background: #222; 
            padding: 20px; 
            border-radius: 12px; 
            box-sizing: border-box; 
        }

        textarea { 
            width: 100%; 
            height: 120px; 
            background: #333; 
            color: #fff; 
            border: 1px solid #555; 
            font-family: Menlo, Monaco, Consolas, "Courier New", monospace; 
            font-size: 16px; 
            box-sizing: border-box;
            border-radius: 8px;
            padding: 10px;
        }

        .controls { 
            margin-top: 15px; 
            display: flex; 
            justify-content: center; 
        }

        button { 
            padding: 15px 40px; 
            background: #0088ff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="canvas" width="800" height="800"></canvas>
</div>

<div id="ui">
    <textarea id="simai-input">(160){4} 1,2,3,4,5,6,7,8,E</textarea>
    <div class="controls">
        <button id="start-btn">再生 (START)</button>
    </div>
    <p style="font-size: 13px; color: #888; text-align: center; margin-top: 15px;">
        画面の余白や、キャンバスの中央をスワイプしてスクロールしてください。
    </p>
</div>

<script>
const ASSETS_LIST = {
    outline: 'outline.png', tap: 'tap.png', perfect: 'judge_text_perfect.png'
};

const ANGLES = [0, -67.5, -22.5, 22.5, 67.5, 112.5, 157.5, 202.5, 247.5];
const images = {};
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let notes = [];
let effects = [];
let startTime = 0;
let isPlaying = false;

async function loadImages() {
    for (const [name, url] of Object.entries(ASSETS_LIST)) {
        const img = new Image();
        img.src = url;
        await new Promise(r => img.onload = r);
        images[name] = img;
    }
    drawBase();
}

function drawBase() {
    ctx.clearRect(0, 0, 800, 800);
    if (images.outline) ctx.drawImage(images.outline, 0, 0, 800, 800);
}

// 判定ロジック
function judge(pos) {
    if (!isPlaying) return;
    const now = performance.now() - startTime;
    const hitNote = notes.find(n => !n.hit && Math.abs(n.time - now) < 200 && n.pos === pos);
    if (hitNote) {
        hitNote.hit = true;
        effects.push({ angle: ANGLES[pos] * Math.PI / 180, startTime: performance.now() });
    }
}

// タッチイベントの管理
function handleTouch(e) {
    const rect = canvas.getBoundingClientRect();
    const touches = e.changedTouches ? Array.from(e.changedTouches) : [e];
    
    let isGameplay = false;

    touches.forEach(t => {
        const scaleX = 800 / rect.width;
        const scaleY = 800 / rect.height;
        const x = (t.clientX - rect.left) * scaleX - 400;
        const y = (t.clientY - rect.top) * scaleY - 400;
        const dist = Math.sqrt(x*x + y*y);

        // 外周付近（ボタンエリア）を触った場合のみ反応
        if (dist > 220 && dist < 450) {
            isGameplay = true;
            const angle = Math.atan2(y, x) * 180 / Math.PI;
            const normAngle = angle < -78.75 ? angle + 360 : angle;
            
            for (let i = 1; i <= 8; i++) {
                if (Math.abs(normAngle - ANGLES[i]) < 22.5) {
                    judge(i);
                    break;
                }
            }
        }
    });

    // ゲームエリア（外周）を叩いた時だけ、スクロールやズームを止める
    // 中央付近を触っているときはブラウザに任せる（スクロールできる）
    if (isGameplay && e.cancelable) {
        e.preventDefault();
    }
}

// Safariでの挙動を安定させるため passive: false を指定
canvas.addEventListener('touchstart', handleTouch, { passive: false });
canvas.addEventListener('mousedown', handleTouch);

document.getElementById('start-btn').addEventListener('click', () => {
    const input = document.getElementById('simai-input').value;
    notes = [];
    let curTime = 1000;
    input.replace(/\s+/g, '').split(',').forEach(t => {
        const m = t.match(/[1-8]/);
        if (m) notes.push({ type: 'tap', time: curTime, pos: parseInt(m[0]), hit: false });
        curTime += 500;
    });
    startTime = performance.now();
    isPlaying = true;
    requestAnimationFrame(update);
});

function update(now) {
    if (!isPlaying) return;
    const elapsed = now - startTime;
    drawBase();
    
    notes.forEach(n => {
        const diff = n.time - elapsed;
        if (diff > -200 && diff < 1200 && !n.hit) {
            const p = 1 - (diff / 1200);
            const sA = ANGLES[n.pos] * Math.PI / 180;
            if (images.tap) {
                ctx.save();
                ctx.translate(400 + Math.cos(sA)*350*p, 400 + Math.sin(sA)*350*p);
                ctx.rotate(sA + Math.PI/2);
                ctx.drawImage(images.tap, -40, -40, 80, 80);
                ctx.restore();
            }
        }
    });

    effects = effects.filter(e => {
        const age = (performance.now() - e.startTime) / 400;
        if (age >= 1) return false;
        ctx.save();
        ctx.globalAlpha = 1 - age;
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(400 + Math.cos(e.angle)*350, 400 + Math.sin(e.angle)*350, 30 + age*20, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
        return true;
    });

    requestAnimationFrame(update);
}

loadImages();
</script>
</body>
</html>
</html>
