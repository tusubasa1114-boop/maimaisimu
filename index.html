<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maimai Simulator - Fix</title>
    <style>
        /* ページ全体をスクロール可能に強制 */
        html, body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: sans-serif;
            overflow-x: hidden;
            overflow-y: auto !important; /* スクロールを許可 */
            -webkit-overflow-scrolling: touch; /* iOS用スムーズスクロール */
        }

        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 100px; /* 下に余白 */
        }

        #game-container { 
            position: relative; 
            width: min(95vw, 650px); 
            height: min(95vw, 650px); 
            margin: 20px auto; 
            flex-shrink: 0;
            /* touch-actionをautoにすることで、ブラウザのスクロールを優先 */
            touch-action: auto; 
        }

        canvas { 
            background: black; 
            border-radius: 50%; 
            width: 100%; 
            height: 100%; 
            display: block;
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }

        #ui { 
            width: min(90vw, 600px); 
            background: #222; 
            padding: 20px; 
            border-radius: 10px; 
            box-sizing: border-box; 
        }

        textarea { 
            width: 100%; 
            height: 120px; 
            background: #333; 
            color: #fff; 
            border: 1px solid #555; 
            font-family: monospace; 
            font-size: 16px; /* スマホでズームされないサイズ */
            box-sizing: border-box;
        }

        .controls { 
            margin-top: 15px; 
            display: flex; 
            justify-content: space-between; 
        }

        button { 
            padding: 15px 30px; 
            background: #0088ff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 18px; 
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="canvas" width="800" height="800"></canvas>
</div>

<div id="ui">
    <textarea id="simai-input">(160){4} 1h[2:1], 3h[1:1], 5-1[2:1], 6>2[2:1], 7pp3[2:1], E</textarea>
    <div class="controls">
        <button id="start-btn">再生 (START)</button>
    </div>
    <p style="font-size: 12px; color: #aaa; margin-top: 10px;">
        ※画面の真ん中あたりをスワイプすると上下に動かせます。
    </p>
</div>

<script>
const ASSETS_LIST = {
    outline: 'outline.png', tap: 'tap.png', break: 'tap_break.png',
    each: 'tap_each.png', hold: 'hold.png', star: 'star.png', slide: 'slide.png',
    perfect: 'judge_text_perfect.png', great: 'judge_text_great.png',
    good: 'judge_text_good.png', miss: 'judge_text_miss.png'
};

const ANGLES = [0, -67.5, -22.5, 22.5, 67.5, 112.5, 157.5, 202.5, 247.5];
const images = {};
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let notes = [];
let effects = [];
let startTime = 0;
let isPlaying = false;

// 画像読み込み
async function loadImages() {
    for (const [name, url] of Object.entries(ASSETS_LIST)) {
        const img = new Image();
        img.src = url;
        await new Promise(r => img.onload = r);
        images[name] = img;
    }
    drawBase();
}

function drawBase() {
    ctx.clearRect(0, 0, 800, 800);
    if (images.outline) ctx.drawImage(images.outline, 0, 0, 800, 800);
}

// 入力処理（スクロールを邪魔しない版）
function handleInput(e) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    
    const x = (touch.clientX - rect.left) * (800 / rect.width) - 400;
    const y = (touch.clientY - rect.top) * (800 / rect.height) - 400;
    const dist = Math.sqrt(x*x + y*y);

    // 外周（ボタン付近）を触った時だけ反応
    if (dist > 200 && dist < 450) {
        const angle = Math.atan2(y, x) * 180 / Math.PI;
        const normAngle = angle < -78.75 ? angle + 360 : angle;
        let pos = 0;
        for (let i = 1; i <= 8; i++) {
            if (Math.abs(normAngle - ANGLES[i]) < 22.5) { pos = i; break; }
        }
        if (pos > 0) judge(pos);
    }
}

// 判定ロジック
function judge(pos) {
    if (!isPlaying) return;
    const now = performance.now() - startTime;
    const hitNote = notes.find(n => !n.hit && Math.abs(n.time - now) < 250 && (n.pos === pos || n.start === pos));
    if (hitNote) {
        hitNote.hit = true;
        effects.push({ img: images.perfect, angle: ANGLES[pos] * Math.PI / 180, startTime: performance.now() });
    }
}

// ここで preventDefault を使わないことでスクロールを維持
canvas.addEventListener('touchstart', handleInput);
canvas.addEventListener('mousedown', handleInput);

document.getElementById('start-btn').addEventListener('click', () => {
    notes = parseSimai(document.getElementById('simai-input').value);
    startTime = performance.now();
    isPlaying = true;
    requestAnimationFrame(update);
});

// 解析（簡易版）
function parseSimai(text) {
    const parsed = [];
    let curTime = 1000;
    text.replace(/\s+/g, '').split(',').forEach(token => {
        if (token.match(/[1-8]/)) {
            parsed.push({ type: 'tap', time: curTime, pos: parseInt(token[0]) });
        }
        curTime += 500;
    });
    return parsed;
}

function update(now) {
    if (!isPlaying) return;
    const elapsed = now - startTime;
    drawBase();
    
    notes.forEach(n => {
        const diff = n.time - elapsed;
        if (diff > -200 && diff < 1000 && !n.hit) {
            const p = 1 - (diff / 1000);
            const sA = ANGLES[n.pos] * Math.PI / 180;
            ctx.drawImage(images.tap, 400 + Math.cos(sA)*350*p - 40, 400 + Math.sin(sA)*350*p - 40, 80, 80);
        }
    });

    effects = effects.filter(e => {
        const age = (performance.now() - e.startTime) / 500;
        if (age >= 1) return false;
        ctx.globalAlpha = 1 - age;
        ctx.drawImage(e.img, 400 + Math.cos(e.angle)*300 - 50, 400 + Math.sin(e.angle)*300 - 25, 100, 50);
        ctx.globalAlpha = 1.0;
        return true;
    });

    requestAnimationFrame(update);
}

loadImages();
</script>
</body>
</html>
